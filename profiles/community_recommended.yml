# Community Recommended Profile — 2025-07-16 Client
#
# All recommend:yes patches from the WARP patch definitions.
# This is the minimal set to get a working English client.
#
# Usage:
#   1. Place your unpacked 2025-07-16 exe in the Inputs/ folder
#   2. Update the 'from' path below to match your exe filename
#   3. Run: win32/WARP_console.exe -using profiles/community_recommended.yml
#   4. Your patched exe will be in Outputs/

from: "Inputs/2025-07-16_Ragexe_unpacked.exe"
to: "Outputs/patched.exe"

inputs:
    $newTownInfo:
        data: '53797374656d454e2f546f776e696e666f2e6c756200'
        display: "SystemEN/Towninfo.lub"
        type: 10

    $newItemInfo:
        data: '53797374656d454e2f6974656d696e666f2e6c756100'
        display: "SystemEN/iteminfo.lua"
        type: 10

    $dataINI:
        data: '444154412e494e4900'
