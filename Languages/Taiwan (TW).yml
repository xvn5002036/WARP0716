#
#
##===================================#
## Text orientation & other settings #
##===================================#
#
RTL: no
#
##============================#
## Tab names for TestBench UI #
##============================#
#
tabs:
    - 修補
    - 擴充
    - 測試
    - 結果

##========================#
## File/Dir Dialog titles #
##========================#

dialogs:
    dir: "選擇包含測試 exe 檔案的目錄"
    src: "選擇來源 exe 檔案"
    tgt: "選擇目標 exe 檔案"
    loadS: "選擇要載入的工作階段檔案"
    saveS: "選擇工作階段檔案的另存位置"

actions:

    #==============#
    # Patches Page #
    #==============#
      
    getPatches:
        title:  取得<br>修補
        tooltip: 使用所有已定義的修補項目填入修補清單
    
    selVisiblePatches:
        title: 選取<br>可見項目
        tooltip: 選取目前所有可見的修補項目
    
    clearSelPatches:
        title: 清除<br>已選項目
        tooltip: 清除所有已選取的修補項目
    
    #=================#
    # Extensions Page #
    #=================#
    
    getExtns:
        title: 取得<br>擴充
        tooltip: 使用所有已定義的擴充項目填入擴充清單

    
    selVisibleExtns:
        title: 選取<br>可見項目
        tooltip: 選取目前所有可見的擴充項目
    
    clearSelExtns:
        title: 清除<br>已選項目
        tooltip: 清除所有已選取的擴充項目
    
    #==============#
    # Testers Page #
    #==============#
    
    getExes: 
        title: 取得執行檔
        tooltip: 使用在測試目錄中找到的所有 .exe 檔案填入執行檔清單
    
    selVisibleExes:
        title: 選取<br>可見項目
        tooltip: 選取目前所有可見的執行檔
    
    clearSelExes:
        title: 清除<br>已選項目
        tooltip: 清除所有已選取的執行檔
    
    #==============#
    # Results Page #
    #==============#
    
    runTest: 
        title: 執行測試
        tooltip: 在已選取的執行檔清單中測試已選取的修補與擴充項目，並顯示在「結果」分頁
    
    #=======================#
    # Script Window related #
    #=======================#
    
    showScriptWin:
        title: 顯示腳本視窗
        tooltip: 顯示 (Alt+W) 腳本視窗，用於快速測試腳本
    
    #=========================#
    # Remaining Quick Actions #
    #=========================#
    
    loadSrcExe:
        title: 載入<br>檔案
        tooltip: 載入來源執行檔，並在尚未載入時一併載入腳本
    
    applyPatches: 
        title: 套用<br>修補
        tooltip: 將選取的修補套用到已載入的執行檔，並另存為輸出檔案
    
    selectPrev:
        title: 選取<br>上次項目
        tooltip: 選取上次套用的所有修補項目
    
    selectRcmd:
        title: 選取<br>建議項目
        tooltip: 選取所有標記為「建議」的修補項目
    
    loadChangedScripts:
        title: 載入<br>腳本
        tooltip: 載入/重新載入 (Alt+C) 自上次載入後已修改，且位於 'Scripts' 目錄內 'Patches'、'Support' 與 'Extensions' 子資料夾中的所有 .qjs 腳本檔案
    
    clearOutput:
        title: 清除
        tooltip: 清除「輸出」檢視
    
    evalScript: 
        title: 評估
        tooltip: 評估 (Ctrl+R) 編輯器中的腳本，並將結果輸出到「輸出」
    
    clearEditor: 
        title: 清除
        tooltip: 清除腳本編輯器
    
    #================#
    # Filter Options #
    #================#

    rexBtn:
        tooltip: 選擇要使用正規表示式或萬用字元比對
    
    csBtn:
        tooltip: 選擇是否區分大小寫
    
    #============#
    # Menu Items #
    #============#
    
    loadPatchScripts:
        title: 從 <b>'Patches'</b> 載入
        tooltip: 載入/重新載入 (Alt+P) 'Scripts/Patchs' 目錄中的所有 .qjs 腳本檔案
    
    loadExtnScripts:
        title: 從 <b>'Extensions'</b> 載入
        tooltip: 載入/重新載入 (Alt+E) 'Scripts/Extensions' 目錄中的所有 .qjs 腳本檔案
    
    loadSuppScripts:
        title: 從 <b>'Support'</b> 載入
        tooltip: 載入/重新載入 (Alt+S) 'Scripts/Support' 目錄中的所有 .qjs 腳本檔案
    
    loadAllScripts:
        title: 載入<b>所有</b>腳本
        tooltip: 載入/重新載入 (Alt+A) 'Scripts' 目錄內 'Patches'、'Support' 與 'Extensions' 子資料夾中的所有 .qjs 腳本檔案
    
    loadSession:
        title: 載入工作階段檔案
        tooltip: 從指定的工作階段檔案載入所有修補選取項目與輸入
    
    saveSession:
        title: 儲存工作階段檔案
        tooltip: 將所有修補選取項目與輸入儲存到指定的工作階段檔案
    
    refreshLanguages:
        title: 重新整理語言
        tooltip: 載入 'Languages' 資料夾中 .yml 檔案提供的語言清單
    
    refreshStyles:
        title: 重新整理樣式
        tooltip: 載入 'Styles' 資料夾中 .yml 檔案提供的樣式清單
    
    loadExtns:
        title: 載入擴充
        tooltip: 使用所有已定義的擴充項目填入擴充抽屜
    
    pro2Session:
        title: 將設定檔轉換為工作階段
        tooltip: 將 NEMO 設定檔轉換為 WARP 使用的工作階段檔案

    genSecFile:
        title: 產生安全檔案
        tooltip: 產生安全檔案，內含輸入檔案的多個雜湊值；該檔案可以是執行檔，也可以不是
    #=========================#
    # Settings Dialog related #
    #=========================#
    saveResolution:
        title: 儲存解析度
        tooltip: 將目前測試視窗的解析度儲存為預設值
    
    keepTestInputs:
        title: 保留測試輸入
        tooltip: 選項：為接下來的每個測試保留先前儲存的輸入
    
    stopAtError:
        title: 發生錯誤時停止
        tooltip: 選項：在發生第一個錯誤時停止執行測試

    saveResolutions:
        title: 儲存解析度
        tooltip: 將目前主視窗與腳本視窗的解析度儲存為預設值

    showVersion:
        title: 顯示已載入版本
        tooltip: 勾選以顯示已載入 .exe 的建置版本與日期
        
    enableEPI:
        title: 啟用 EPI
        tooltip: 啟用 EPI 檔案的產生與載入，並與對應的執行檔一起使用。請謹慎使用。
    
    genTgtSecure:
        title: 產生 <目標>.secure.txt
        tooltip: 啟用安全檔案 (.secure.txt) 的產生，並與目標執行檔一起使用

    # repPatchMod:
    #     title: 回報修補變更
    #     tooltip: 選項：回報依修補項目暫存的變更，預設使用「記錄」機制
    
    genTgtSession:
        title: "產生目標工作階段"
        tooltip: 啟用工作階段檔案的產生，以便稍後與目標執行檔一起使用
    
    keepInputs:
        title: 保留工作階段輸入
        tooltip: 選項：載入工作階段檔案時保留已儲存的輸入，而不是逐一詢問

