CustomChar:
    title : "角色自訂"
    mutex : false
    color : darkorchid
    
    patches:
        - OfficialPal:
            title : "使用官方布料色盤"
            recommend : no
            author : Neo-Mind
            desc : "強制用戶端在所有 langtypes 使用 Gravity 官方服裝色盤。<b>警告：</b>與「啟用自訂職業」修補不相容。"
        
        - NoGMSprite:
            title : "停用 GM 精靈"
            recommend : no
            author : Neo-Mind
            desc : "隱藏特殊的 GM 精靈 (the yellow character)，同時保持所有 GM 功能完整，包括黃色名稱色彩和管理右鍵選單。總經理似乎是他們的正常工作類別。"
        
        - ShowBGEmblem:
            title : "為 BG 啟用徽章懸停 [實驗]"
            recommend : no
            author : Neo-Mind
            desc : "在 Battleground 地圖中的角色上方顯示公會徽章，與 Guild 與 Guild (WoE) 期間的顯示方式相同。協助識別 BG 中的團隊成員。實驗性的－可能有視覺上的怪癖。"
        
        - RestoreModelCulling:
            title : "還原模型剔除"
            recommend: no
            author : Curiosity , Neo-Mind
            desc : "讓遮蔽玩家角色視野的 3D 模型 (buildings, walls, objects) 變得透明。提高具有大型遮蔽模型的區域的可見度。"
        
        - Intravision:
            title : "始終看到隱藏/隱藏的物體"
            recommend : no
            author : Secret, A.K.M. , Neo-Mind
            desc : "讓隱藏和隱形的角色 /objects 始終以黑色輪廓可見，就好像玩家永久擁有 Intravision 增益一樣。對於 GM 或測試很有用——在 PvP 中提供不公平的優勢。"
        
        - CustomQSDelay:
            title : "自訂快速切換延遲"
            recommend : no
            author : mrjnumber1
            desc : "變更快速裝備交換功能的冷卻延遲 (in ticks)。較低的值允許更快的檔位切換；較高的值會強制交換之間的等待時間更長。"
        
        - AllowPL2Leave:
            title : "允許黨魁離開"
            recommend : no
            author : Andrei Karas (4144) , Neo-Mind
            desc : "當同一張地圖上沒有其他成員時，允許隊伍領袖離開隊伍。預設情況下，當隊伍仍然存在時，用戶端會阻止領導者離開。"
        
        - AllowSkillSpam:
            title : "透過熱鍵允許洗頻技能"
            recommend : no
            author : Neo-Mind, Functor , Andrei Karas (4144) , CrazyBebop , Victor Hugo
            desc : "可以按住熱鍵來快速施放技能，而不必重複按下。消除熱鍵啟動之間的用戶端冷卻時間。"
        
        - AllowGuildInClan:
            title : "允許部落內進行公會活動"
            recommend : no
            author : Functor, Secret , Neo-Mind
            desc : "刪除了當玩家是部落成員時阻止公會功能 (creating/joining guilds, GvG, etc.) 的用戶端限制。允許兩種成員資格共存。"
        
        - CustomAFStopDelay:
            title : "自訂自動跟隨停止延遲"
            recommend : no
            author : Andrei Karas (4144)
            desc : "變更目標移出範圍後自動跟隨停止之前的延遲。較低的值使角色停止得更快；更高的價值會持續更長時間。"
        
        - ShowGvGDamage:
            title : "顯示 GvG 的傷害"
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : "顯示 Guild 與 Guild (WoE) 地圖上的傷害數字。預設情況下，用戶端會在 GvG 期間隱藏所有傷害數字，以減少視覺混亂，但這使得很難衡量有效性。"

        - Allow65kHairs:
            title     : "允許 65k 髮型"
            recommend : no
            author    : Ai4rei/AN, Neo-Mind, CrazyBebop
            desc      : "刪除了硬編碼的髮型限制，允許用戶端按數量載入任何頭髮精靈。最多支援 65535 樣式。"

CustomAutoFollow:
    title : "自動跟隨客製化"
    mutex : true
    
    patches:
        - NoAutoFollow:
            title : "停用自動跟隨"
            recommend : no
            author : Functor , Neo-Mind
            desc : "完全停用 Shift+右鍵點擊自動跟隨功能。在自動關注被認為是一種利用或不需要的伺服器上使用。"
        
        - DecrAFDelay:
            title : "減少自動跟隨延遲"
            recommend : no
            author : CH.C (jchcc)
            desc : "減少 Shift+右鍵後自動跟隨開始移動之前的初始延遲。較低的值使角色更快開始跟隨。"

CustomAura:
    title : "光環客製化"
    mutex : false
    
    patches:
        - CustomAuraSprites:
            title : "自訂光環精靈"
            recommend : no
            author : Shinryo
            desc : "使用專用檔案 (aurafloat.tga and auraring.bmp in 'data\\\\texture\\\\effect') 將光環精靈與扭曲傳送門效果分開。防止高級角色光環在視覺上乾擾傳送門。"
        
        - CustomAuraLimits:
            title : "自訂 Aura 顯示限制"
            recommend : no
            author : Neo-Mind
            desc : "自訂哪些角色類別和等級顯示標準光環效果。設定光環可見性的最低等級和允許的工作類別，以符合伺服器的進度系統。"

CustomChatColor:
    title : "<font color=\"#9F00EF\"> CHA </font> <font color=\"#5F00FF\"> T CO </font> <font color=\"blue\"> LOR </font> <font color=\"green\"> CUS </font> <font color=\"yellow\"> TOM </font> <font color=\"orange\"> IZA </font> 1K1K12__131K12__212__"
    mutex : false
    
    patches:
        - CustomGMColor:
            title : "自訂聊天色彩（GM）"
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : "将 GM 聊天消息的颜色變更为自定义十六进制值。預設為 ffff00 (yellow) 。用于使 GM 公告以您喜欢的颜色脱颖而出。"
    
        - CustomGuildColor:
            title : "自訂聊天色彩（公會）"
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : "將公會聊天訊息的色彩變更為自訂十六進位值。預設為 b4ffb4 (light green) 。"
        
        - CustomPartyColor:
            title : "自訂聊天色彩（派對-其他）"
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : "將其他成員的聚會聊天訊息的色彩變更為自訂十六進位值。預設為 ffc8c8 (pinkish) 。"
        
        - CustomPartyColorSelf:
            title : "自訂聊天色彩（派對-自己）"
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : "將您自己的派對聊天訊息的色彩變更為自訂十六進位值。預設為 ffc800 (orange) 。"
        
        - CustomPublicColor:
            title : "自訂聊天色彩（公共-其他）"
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : "將其他玩家的公共聊天訊息的色彩變更為自訂十六進位值。預設為 ffffff (white) 。"
        
        - CustomPublicColorSelf:
            title : "自訂聊天色彩（公共-自我）"
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : "將您自己的公開聊天訊息的色彩變更為自訂十六進位值。預設值為 00ff00 (green) 。"

SkipCheatCheck:
    title : "跳過作弊檢查"
    mutex : false
    
    patches:
        - SkipInFriendList:
            title : "跳過好友清單作弊檢查"
            recommend : no
            author : Ai4rei/AN
            desc : "當收到姓名與您清單中的好友相似的人寄來的私訊時，請停用 \"possible impersonation\" 警告。該警告旨在偵測名稱欺騙，但會導致誤報。"
        
        - SkipInGuildList:
            title : "跳過公會成員作弊檢查"
            recommend : no
            author : Ai4rei/AN
            desc : "當收到名字與公會成員相似的人的私訊時，停用 \"possible impersonation\" 警告。與好友清單版本相同，但適用於公會成員。"

WalkDelay:
    title : "步行延遲"
    mutex : true
    
    patches:
        - NoWalkDelay:
            title : "消除步行延遲"
            recommend : no
            author : MegaByte , X-EcutiOnner
            desc : "完全消除步行點擊輸入之間的延遲，從而實現即時的移動響應。  <b>注意：</b> 可能會導致用戶端向伺服器傳送重複的行動封包。"
        
        - CustomWalkDelay:
            title : "自訂步行延遲"
            recommend : no
            author : MegaByte , X-EcutiOnner
            desc : "將步行點擊輸入之間的延遲變更為自訂值 (in milliseconds) 。較低的值使運動反應更加靈敏。  <b>注意：</b> 非常低的值可能會導致用戶端傳送重複的行動封包。"

ResButtonVis:
    title : "復活按鈕可見性"
    mutex : true
    color : darkorange
    
    patches:
        - HideResButton:
            title : "跳過復活按鈕"
            recommend : no
            author : Shinryo
            desc : "當玩家死亡時隱藏齊格飛復活按鈕，即使它在背包中。在不需要自我復活或代幣已被重新利用的伺服器上使用。"
        
        - ShowResButton:
            title : "始終顯示復活按鈕"
            recommend : no
            author : Neo-Mind
            desc : "無論地圖類型如何，死亡時始終顯示齊格飛復活按鈕。預設情況下，該按鈕在某些地圖類型（例如 PvP 或 GvG 地圖）上隱藏。"
