CustomSound:
    title : "聲音客製"
    mutex : false
    
    patches:
        - Enable44kHzAudio:
            title : "啟用 44.1 kHz 音訊取樣頻率"
            recommend : no
            author : CH.C (jchcc)
            desc : "將音訊取樣率從預設 (22 kHz) 升級到 44.1 kHz (CD quality) 。在記憶體使用量略有增加的情況下改善音效和 BGM 清晰度。"
        
        - AutoMute:
            title : "自動靜音音訊[實驗]"
            recommend : no
            author : CH.C (jchcc)
            desc : "當用戶端視窗失去焦點時自動靜音所有遊戲音訊 (e.g., when alt-tabbed) 。當視窗再次處於活動狀態時，音訊將還原。實驗性的－可能不適用於所有聲音設定。"
        
        - NoBGMAudio:
            title : "停用 BGM 音訊"
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : "停用從 mp3NameTable.txt 載入背景音樂，防止 BGM 在任何地圖上播放。如果您想要完全靜音的遊戲或透過外部方式處理音樂，請使用。"

