CustomEnv:
    title : "環境客製化"
    mutex : false
    
    patches:
        - HKLMtoHKCU:
            title : "HKLM 至 HKCU"
            recommend : no
            author : Shinryo
            desc : "將登入存取從 HKEY_LOCAL_MACHINE 切換到 HKEY_CURRENT_USER。允許用戶端在沒有管理員權限的情況下儲存設置，這在共用或受限電腦上是必需的。"
            
        
        - NoAdminNeeded:
            title : "刪除管理員權限要求"
            recommend : no
            author : X-EcutiOnner
            desc : "消除了用戶端對管理員權限的要求，因此它在啟動時不會出現 UAC 提升提示。對於不能或不願意以管理員身份執行遊戲的玩家很有用。"
        
        - LoadClientPlugins:
            title : "始終載入用戶端外掛[實驗]"
            recommend : no
            author : Secret
            desc : "無論用戶端的聲音設定如何，都會強制載入用戶端外掛 (3rd party DLLs in the plugins folder)。通常外掛僅在啟用聲音時載入。"
        
        - NoMultiWindow:
            title : "停用多個視窗"
            recommend : no
            author : Shinryo , Ai4rei/AN
            desc : "防止在所有 langtypes 上一次啟動多個遊戲用戶端。如果開啟第二個實例，則透過顯示錯誤來阻止多用戶端。"
        
        - CustomMinResolution:
            title : "自訂最小螢幕解析度"
            recommend : no
            author : Andrei Karas (4144)
            desc : "將允許的最小螢幕解析度從預設 1024x768 變更為自訂值。對於在舊硬體上支援較小的解析度或進行測試很有用。"
        
        - IgnoreDebugger:
            title : "忽略除錯工具"
            recommend : no
            author : Andrei Karas (4144)
            desc : "停用 IsDebuggerPresent() 反偵錯檢查，允許用戶端在偵錯器下運作。僅用於開發和逆向工程－請勿用於分發給玩家的生產用戶端。"

#        - IncreaseLightmapQuality:
#            title : Increase lightmap quality (4x)
#            recommend : no
#            author : Andre , CrazyBebop
#            desc : Increases lightmap subdivision from 1 to 4, resulting in 4x higher resolution ground shadows and sharper lighting.

        - DisableIndoorRSW:
            title : "停用室內 RSW 照明"
            recommend : no
            author : Skylove , CrazyBebop
            desc : "停用強制室內地圖上固定攝影機角度和照明的 IndoorRswTable.txt 查找。允許攝影機在室內自由旋轉，類似於 NoCameraLock 修補，但專門針對基於 RSW 的室內限制。"

        - RemovePremiumService:
            title : "刪除高級服務文本"
            recommend : no
            author : Victor Hugo
            desc : "從字元選取畫面中刪除 \"Premium Service\" 文字。由於沒有高級訂閱系統，因此本文與伺服器無關。"

WindowFrame:
    title : "窗框客製化"
    mutex : false
    
    patches:
        - EnableSysMenu:
            title : "啟用標題按鈕"
            recommend : yes
            author : Shinryo
            desc : "將標準 Windows 標題列按鈕 (Minimize, Maximize, Close) 和套用程式圖示新增至遊戲視窗。使用戶端的行為像普通視窗而不是無邊框框架。"
    
        - UseMiniTitle:
            title : "使用微型標題欄"
            recommend : no
            author : Andrei Karas (4144)
            desc : "將遊戲視窗切換為使用緊湊的 /miniature 標題列而不是標準尺寸的標題列。節省螢幕空間，同時仍顯示視窗控制項。"
        
        - CustomWinTitle:
            title : "自訂視窗標題"
            recommend : no
            author : Shinryo
            desc : "將遊戲視窗標題列中顯示的文字變更為自訂字串。用於顯示您的伺服器名稱而不是預設的 \"Ragnarok\" 標題。"
        
        - BorderlessFSW:
            title : "啟用無邊框全螢幕"
            recommend : no
            author : Andrei Karas (4144)
            desc : "啟用無邊框全螢幕模式 - 當遊戲解析度與螢幕解析度相符時刪除視窗框架和邊框。提供無縫的全螢幕體驗，同時允許輕鬆使用 Alt-Tab。"

ClientArgs:
    title : "客戶的論點"
    mutex : false
    
    patches:
        - No1and1Arg:
            title : "停用“1*1”參數"
            recommend : yes
            author : Shinryo
            desc : "刪除了對啟動器參數 (1rag1, 1sak1, etc.) 的要求，以便可以透過雙擊 exe 直接啟動用戶端。如果沒有這個，用戶端將拒絕啟動，除非透過修補程式開啟。"

        - IgnoreAccArg:
            title : "忽略“/account:”參數"
            recommend : no
            author : Secret
            desc : "使用戶端忽略 <b>/account:</b> 命令列參數。防止玩家以自訂的 clientinfo.xml 覆蓋伺服器的 clientinfo.xml ，自訂的 clientinfo.xml 可用於重新導向連線。"

EnableIcon:
    title : "啟用圖示"
    mutex : true
    
    patches:
        - RestoreIcon:
            title : "還原內建套用程式圖示"
            recommend : yes
            author : Neo-Mind
            desc : "還原嵌入在執行檔中的原始 Ragnarok Online 圖示，而不是顯示通用 Windows 套用程式圖示。修復工作列和視窗標題中遺失的圖示。"
        
        - CustomIcon:
            title : "自訂套用程式圖示"
            recommend : no
            author : Neo-Mind
            desc : "將套用程式圖示替換為您選取的自訂.ico 檔案 (any size and bit depth) 。對於 Win7 及更高版本，請使用 <b><font color='deepskyblue'> 256x256 32 位元以及 16x16 版本</b> <font> 。 <br> <br> 較舊的用戶端有 3 圖示大小的限制，因此您可能需要選取要包含的解析度。"

AlterPriority:
    title : "優先權變更"
    mutex : false
    
    patches:
        - Idle2NormalPriority:
            title : "變更優先權（閒置到正常）"
            recommend : no
            author : Andrei Karas (4144)
            desc : "當遊戲視窗處於非活動狀態時，將遊戲的執行緒優先權從「閒置」提高到「正常」。防止遊戲在使用替代選項卡或在背景時顯著減慢。"
        
        - Normal2HighPriority:
            title : "變更優先權（普通到高）"
            recommend : no
            author : Andrei Karas (4144)
            desc : "將活動遊戲視窗的執行緒優先權從「普通」提高到「高」。為用戶端提供更多的 CPU 時間，這可以提高執行許多後台套用程式的系統的效能。"
