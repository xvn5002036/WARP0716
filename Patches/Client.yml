ResizeHealthBar:
    title : "調整 HP 欄位的大小"
    mutex : false
    
    patches:
        - ResizePlayerBar:
            title : "調整播放器 HP/SP 條的大小"
            recommend : no
            author : CH.C (jchcc) , Neo-Mind
            desc : "將自己角色的 HP 和 SP 條的寬度變更為自訂尺寸。有助於使健康欄更易於一目了然。"
        
        - ResizeNormalBar:
            title : "調整普通生物 HP 欄位的大小"
            recommend : no
            author : CH.C (jchcc) , Neo-Mind
            desc : "將普通怪物上方顯示的 HP 條的寬度變更為自訂尺寸。"
        
        - ResizeMiniBossBar:
            title : "調整 Mini-Boss 生物 HP 欄的大小"
            recommend : no
            author : CH.C (jchcc) , Neo-Mind
            desc : "將 Mini-Boss 怪物上方顯示的 HP 條寬度變更為自訂尺寸。有助於區分小首領和普通怪物。"
        
        - ResizeBossBar:
            title : "調整 Boss 生物 HP 欄位的大小"
            recommend : no
            author : CH.C (jchcc) , Neo-Mind
            desc : "將 Boss (MVP) 怪物上方顯示的 HP 條寬度變更為自訂尺寸。有助於區分 Boss 和普通怪物。"

        - AllianceChatHotkeySelector:
            title : "聯盟聊天熱鍵選取器"
            recommend : no
            author : AcidMarco,Skylove
            desc : "允許您選取自訂符號來觸發聯盟聊天，而不是預設的 '#' 。這對於避免與 GM 命令符號（例如 @ 或!）發生衝突很有用。"

DisableEffect:
    title : "停用效果"
    mutex : false
    
    patches:
        - NoEarthQuake:
            title : "停用地震技能效果"
            recommend : no
            author : Ai4rei/AN , CrazyBebop
            desc : "關閉震屏地震技能效果。防止該技能引起的暈車和視覺不適。"
        
        - NoBlindness:
            title : "解除致盲技能效果"
            recommend : no
            author : X-EcutiOnner
            desc : "停用使整個螢幕變暗的盲狀態效果。防止失明時出現令人困惑的黑屏視覺效果。"

        - RestoreSongsEffect:
            title : "還原吟遊詩人 /Dancer 歌曲效果 (Old Song Patch)"
            recommend : no
            author : CH.C (jchcc)
            desc : "還原吟遊詩人和舞者歌曲技能的視覺地面效果。也稱為還原老歌修補。這些效果在較新的用戶端中已被刪除，但此修補使用 LandProtector 的渲染程式碼重建它們。"

EnableSlashCmd:
    title : "斜線指令"
    mutex : false
    
    patches:
        - EnableWho:
            title : "始終啟用“/who”命令"
            recommend : yes
            author : Neo-Mind
            desc : "在所有 langtypes 上啟用 <b>/w</b> 和 <b>/who</b> 指令以顯示目前線上玩家數量。通常僅限於某些服務區域。"
        
        - EnableShowName:
            title : "始終啟用“/showname”命令"
            recommend : yes
            author : Neo-Mind
            desc : "在所有 langtypes 上啟用 <b>/showname</b> 指令，讓玩家切換角色名稱、隊伍名稱和精靈上方的公會名稱的顯示。"
        
        - EnableUnknCmds:
            title : "允許未知的“/命令”[實驗]"
            recommend : no
            author : Ai4rei/AN
            desc : "將無法辨識的 <b>/command</b> 輸入傳送到伺服器，而不是顯示 \"Invalid command\"。允許伺服器端斜線指令（例如自訂腳本）透過聊天框運作。"

NoSkillChatter:
    title : "技能顫振消除"
    mutex : false
    
    patches:
        - NoDancerScream:
            title : "刪除舞者的尖叫隨機語音"
            recommend : no
            author : Neo-Mind
            desc : "刪除使用舞者尖叫技巧 (loaded from dc_scream.txt) 時出現的隨機聊天訊息。減少繁忙區域的聊天洗頻。"
        
        - NoBardFrostJoke:
            title : "刪除吟遊詩人的冰霜笑話隨機語音"
            recommend : no
            author : Neo-Mind
            desc : "刪除使用吟遊詩人的冰霜笑話技能 (loaded from ba_frostjoke.txt) 時出現的隨機聊天訊息。減少繁忙區域的聊天洗頻。"

ResizeBox:
    title : "調整框大小"
    mutex : false
    
    patches:
        - ResizeChatBox:
            title : "調整聊天框大小"
            recommend : no
            author : Shinryo
            desc : "將主 /Battle 聊天輸入框中的字元限制從 <b>70</b> 增加到自訂值。大多數伺服器使用 234 來允許更長的訊息。"
        
        - ResizeChatRoomBox:
            title : "調整聊天室框的大小"
            recommend : no
            author : Shinryo
            desc : "將聊天室輸入框中的字元限制從 <b>70</b> 增加到自訂值。大多數伺服器使用 234 來允許更長的訊息。"
        
        - ResizePMBox:
            title : "調整 PM 框大小"
            recommend : no
            author : Shinryo
            desc : "將 PM (whisper) 輸入框中的字元限制從 <b>70</b> 增加到自訂值。大多數伺服器使用 234 來允許更長的私人訊息。"
        
        - ResizeNpcBox:
            title : "調整 NPC 對話大小"
            recommend : no
            author : Ai4rei/AN
            desc : "將 NPC 對話輸入欄位的最大字元限制增加到自訂值 (between 2052 and 4096) 。對於具有接受較長文字輸入的 NPC 的伺服器很有用。"

RouletteVis:
    title : "輪盤可見性"
    mutex : true
    color : darkorange
    
    patches:
        - HideRoulette:
            title : "隱藏輪盤圖示"
            recommend : no
            author : Neo-Mind
            desc : "在遊戲介面中隱藏輪盤圖示。對於不使用 Gravity 輪盤系統的伺服器很有用。"
        
        - ShowRoulette:
            title : "顯示輪盤圖示"
            recommend : no
            author : Neo-Mind
            desc : "還原 Gravity 在較新用戶端中刪除的輪盤圖示。如果您的伺服器啟用了輪盤功能，請使用此選項。"

CashShop:
    title : "現金店客製化"
    mutex : false
    
    patches:
        - MoveShopIcon:
            title : "行動現金店圖示"
            recommend : no
            author : Neo-Mind
            desc : "將 Cash 商店圖示重新定位到自訂螢幕座標。正值從左上角偏移；負值從右下角偏移。"
        
        - ZeroCinShop:
            title : "在商城中實施 0C"
            recommend : no
            author : Andrei Karas (4144)
            desc : "強制 <b>C</b> (cash point) 欄位顯示 0 而不是 Cash 商店中的隨機垃圾值。修正了不使用 Gravity 現金點系統的伺服器上的顯示錯誤。"
        
        - DefShopBrowser:
            title : "在商城中使用預設網頁瀏覽器"
            recommend : no
            author : CH.C (jchcc)
            desc : "在預設 Web 瀏覽器而不是硬編碼的 Internet Explorer 中開啟 Cash 商店 URL。由於 IE 在現代 Windows 上已被棄用，因此至關重要。"

EquipPreview:
    title : "商店均衡器預覽"
    mutex : false
    
    patches:
        - PreviewInShop:
            title : "在商城中啟用裝備預覽"
            recommend : no
            author : Andrei Karas (4144) , Neo-Mind,Skylove
            desc: "在 Cash 商店 (right-click items to see it) 中新增裝備預覽按鈕。讓玩家在購買前查看裝備的外觀。還需要啟用伺服器端支援。"
        
        - PreviewInTrader:
            title : "在交易商店中啟用裝備預覽"
            recommend : no
            author : Andrei Karas (4144) , Neo-Mind, CrazyBebop
            desc: "在舊式交易商店 (right-click items to see it) 中新增裝備預覽按鈕。還需要啟用伺服器端支援。"

        - HideCashShop:
            title : "隱藏商城圖示"
            recommend : no
            author : Neo-Mind
            desc : "在遊戲介面中隱藏 Cash 商店圖示。對於不使用 Cash 商店或想要更清晰的 UI 的伺服器很有用。"

IncrCamAngle:
    title : "相機角度"
    mutex : true
    
    patches:
        - LowCamAngle:
            title : "增加相機角度（低）"
            recommend : no
            author : Shinryo , CrazyBebop
            desc : "將允許的相機傾斜範圍擴大到大約 <b>30 度</b> ，讓您的視圖角度略低於預設值。對一般遊戲玩法的微妙改進。"
        
        - MediumCamAngle:
            title : "增加相機角度（中）"
            recommend : yes
            author : Shinryo , CrazyBebop
            desc : "將允許的相機傾斜範圍擴大到約 <b>42 度</b> ，在可視性和沈浸感之間提供良好的平衡。建議給大多數玩家。"
        
        - HighCamAngle:
            title : "增加相機角度（高）"
            recommend : no
            author : Shinryo , CrazyBebop
            desc : "將允許的相機傾斜範圍擴大到大約 <b>65 度</b> ，從而實現接近地面的視圖。非常適合螢幕截圖，但可能會導致某些地圖上出現視覺異常。"

IncrZoom:
    title : "縮小"
    mutex : true

    patches:
        - Zoom25Percent:
            title : "減少縮小（至 25%）"
            recommend : no
            author : Shinryo , Andrei Karas (4144)
            desc : "縮小範圍限制為最大值的 25 % 左右，使相機比預設值更近。獲得更放大的遊戲體驗。"
        
        - Zoom50Percent:
            title : "增加縮小（至 50%）"
            recommend : no
            author : Shinryo , Andrei Karas (4144)
            desc : "將縮小範圍擴充到最大值的 50 % 左右，讓您可以看到角色周圍地圖的更多部分。"
        
        - Zoom75Percent:
            title : "增加縮小（至 75%）"
            recommend : no
            author : Shinryo , Andrei Karas (4144) , Functor
            desc : "將縮小範圍擴充至最大值的約 75 %。提供廣闊的視野，對於 WoE 、PvP 和大規模戰鬥很有用。"
        
        - ZoomMax:
            title : "增加縮小（至最大）"
            recommend : no
            author : Shinryo , Andrei Karas (4144)
            desc : "解鎖整個變焦範圍，使相機能夠盡可能拉遠。最大可見度，但精靈可能看起來非常小。"

LoginMode:
    title : "登入方式"
    mutex : true
    
    patches:
        - RestoreLoginWindow:
            title : "還原登入視窗"
            recommend : no
            author : Shinryo , Neo-Mind
            desc : "繞過 Gravity 基於令牌的登入系統並還原經典使用者名稱 /password 登入視窗。對於大多數不使用基於 Web 的啟動器的伺服器來說是必要的。"
        
        - UseSSOLogin:
            title : "使用SSO登入封包"
            recommend : no
            author : Ai4rei/AN
            desc : "強制所有 langtypes 使用 SSO 登入封包 (0x825)，而不是舊的登入封包 (0x64)。使用透過命令列 token 傳遞憑證的修補器/啟動器時需要。<b>警告：</b>與「停用登入密碼加密」(NoPassEncr) 不相容。"
        
        - UseOldLogin:
            title : "使用舊的登入封包"
            recommend : yes
            author : Ai4rei/AN , Andrei Karas (4144)
            desc : "強制用戶端使用舊的登入封包 (0x64) 進行驗證。對於「還原登入視窗」不再有效的新用戶端是必要的。這是多數直接使用帳號/密碼登入伺服器的標準選項。"

ChatRepeat:
    title : "聊天重複"
    mutex : true
    
    patches:
        - UnlimitedChatRepeat:
            title : "允許無限制的聊天重複"
            recommend : no
            author : Neo-Mind
            desc : "消除了用戶端對重複相同聊天訊息的限制。預設情況下，用戶端會阻止您連續多次傳送相同訊息。"
        
        - LimitedChatRepeat:
            title : "自訂聊天重複限制"
            recommend : no
            author : Shinryo
            desc : "將允許的相同連續聊天訊息的最大數量從預設值 2 變更為自訂值。提供比完全消除限制更多的控制。"

CustomSleep:
    title : "睡眠延遲客製"
    mutex : false
    
    patches:
        - AddInpDelay:
            title : "新增輸入延遲"
            recommend : no
            author : Andrei Karas (4144)
            desc : "為用戶端的輸入處理延遲增加額外的毫秒數。可用於限制測試輸入速度或減少低階機器上的 CPU 使用率。"
        
        - CustomGameLoopDelay:
            title : "自訂遊戲循環延遲"
            recommend : no
            author : Andrei Karas (4144)
            desc : "將主遊戲循環中的 Sleep() 延遲變更為自訂值 (in milliseconds) 。較低的值使用戶端反應更快，但使用更多的 CPU；較高的值可以節省 CPU，但會犧牲平滑度。"
