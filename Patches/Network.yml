CustomNW:
    title : "網路客製化"
    mutex : false
    color : peru    
    
    patches:
        - SendMD5Hash:
            title : "傳送 MD5 雜湊包"
            recommend : no
            author : GreenBox , Neo-Mind
            desc : "使用戶端在登入時將其自己的 MD5 雜湊值傳送到所有 langtypes 的伺服器。用於完整性驗證以偵測修改的用戶端執行檔。僅當您的伺服器設定為接收和檢查此封包時才啟用。"
        
        - NoNagle:
            title : "停用 nagle 演算法"
            recommend : yes
            author : Shinryo
            desc : "停用 TCP Nagle 緩衝，以便立即傳送封包。減少輸入延遲並提高響應能力，但代價是稍微增加網路流量。建議用於大多數伺服器。"
        
        - EnableProxy:
            title : "啟用代理支援"
            recommend : no
            author : Ai4rei/AN , Neo-Mind,Skylove
            desc : "在登入、字元和地圖伺服器之間轉換時，忽略伺服器傳送的 IP 位址。相反，讓用戶端連線到 clientinfo.xml 的位址。透過代理、VPN 或伺服器報告內部 LAN 位址時需要。"
            
#        - NoHardCodedAddr:
#            title : Remove hardcoded address/port
#            recommend : yes
#            author :  Andrei Karas (4144)
#            desc : Remove hardcoded connection addresses and ports.
        
        - EnableHttpEmblem:
            title : "修復用戶端中的 HTTP 徽章"
            recommend : no
            author : CH.C (jchcc)
            desc : "修正了在啟用了作弊防禦者的用戶端上透過 HTTP 載入公會徽章的問題。需要在您的伺服器上執行 HTTP 徽章服務。"
            
        - CustomMerchantURL:
            title : "自訂商家商店 URL"
            recommend : no
            author : CH.C (jchcc)
            desc : "將用於儲存和載入 Merchant Store (vending) 資料的硬編碼 URL 變更為自訂 URL。需要您的伺服器上有 HTTP 服務來處理商家商店請求。"
        
        - SendClientFlags :
            title : "傳送用戶端標誌"
            recommend : yes
            author : Andrei Karas (4144)
            desc : "在登入期間將用戶端的功能標記傳送到伺服器，使用戶端和伺服器在支援哪些功能方面保持同步。防止可能導致 UI 元素遺失或功能損壞的不符。"
            


CustomEncKeys:
    title : "加密金鑰客製化"
    mutex : false

    patches:
        - CustomFirstKey:
            title : "自訂封包金鑰（第一）"
            recommend : no
            author : Shakto , Neo-Mind
            desc : "為第一個封包加密金鑰設定自訂值。必須與伺服器上設定的金鑰相符。  <b>警告：</b> 不要與 'Disable Map packet encryption' 結合使用－使用一種方法或另一種方法。"
            needs : NoEncrForLC
        
        - CustomSecondKey:
            title : "自訂封包金鑰（第二）"
            recommend : no
            author : Shakto , Neo-Mind
            desc : "為第二個封包加密金鑰設定自訂值。必須與伺服器上設定的金鑰相符。  <b>警告：</b> 不要與 'Disable Map packet encryption' 結合使用－使用一種方法或另一種方法。"
            needs : NoEncrForLC
        
        - CustomThirdKey:
            title : "自訂封包金鑰（第三）"
            recommend : no
            author : Shakto , Neo-Mind
            desc : "為第三個封包加密金鑰設定自訂值。必須與伺服器上設定的金鑰相符。  <b>警告：</b> 不要與 'Disable Map packet encryption' 結合使用－使用一種方法或另一種方法。"
            needs : NoEncrForLC

DisableEncr:
    title : "停用加密"
    mutex : false
    
    patches:
        - NoPacketEncr:
            title : "停用地圖包加密"
            recommend : no
            author : Ai4rei/AN
            desc : "停用與地圖伺服器通訊時使用的封包混淆（加密）。可簡化未使用加密伺服器的封包處理。<br>此修補也稱為「跳過封包混淆」。"
        
        - NoEncrForLC:
            title : "停用登入/字元包加密"
            recommend : no
            author : Neo-Mind
            desc : "停用與登入伺服器和字元伺服器通訊的封包加密。大多數不實作 Gravity 加密握手的伺服器模擬器都需要它。"
        
        - NoPassEncr:
            title : "停用登入密碼加密"
            recommend : yes
            author : Andrei Karas (4144) , Jchcc
            desc : "停用舊登入封包 (0x64) 中 langtypes 4 和 7 的密碼加密。對於使用這些 langtypes 的明文或 bcrypt 密碼驗證的伺服器是必要的。  <b>警告：</b> 與 'Use SSO Login Packet' 衝突－請勿同時啟用兩者。"
            needs : UseOldLogin
