CustomData:
    title : "資料客製化"
    mutex : false
    color : deepskyblue
    
    patches:
        - CustomMaxEmbFileSize:
            title : "自訂最大徽章檔案大小"
            recommend : no
            author : Andrei Karas (4144)
            desc : "變更公會徽章允許的最大檔案大小。如果玩家在上傳詳細或高解析度的公會徽章時遇到錯誤，請增加此值。"
        
        - CustomRodexTax:
            title : "客製化RoDEx 稅"
            recommend : no
            author : Andrei Karas (4144)
            desc : "變更透過 RoDEx (mail) 系統傳送 zeny 時扣除的稅金百分比。設定為 0 以完全消除稅收，或根據伺服器的經濟狀況進行調整。"
        
        - CustomGuildExpLimit:
            title : "自訂公會經驗限制"
            recommend : no
            author : Andrei Karas (4144)
            desc : "變更玩家可以捐贈給其公會的經驗的最大百分比。預設為 50 %。調整以符合您伺服器的公會設定。"
        
        - CustomAdvAgencyLimits:
            title : "自訂冒險家機構等級"
            recommend : no
            author : Andrei Karas (4144), Asheraf
            desc : "變更冒險家機構 (party finder) 視窗中顯示的最小和最大等級範圍。進行調整以配合伺服器的等級上限和隊伍要求。"

        - EnableCustomFonts:
            title : "啟用官方自訂字型 (Reforged)"
            recommend : no
            needs : FixFontsCharset
            author : CrazyBebop, Shinryo
            desc : "在 init 時透過 AddFontResourceExA 載入自訂.ttf 字型，繞過現代 Windows 上損壞的 T2Embed API。首次套用時提示將包含的.ttf 字型複製到用戶端資料夾。需要 FixFontsCharset (auto-enabled) 。"

        - FixFontsCharset:
            title : "修復字型的字元集"
            recommend : no
            author : CrazyBebop, CH.C (jchcc)
            desc : "修正了用於官方自訂字型 (EOT and OTF) 的字元編碼 (charset) ，以便它們在所有 langtypes 上正確呈現。防止在非韓語服務類型上使用自訂字型時出現亂碼。修正了 07 - 16 的 EDI 暫存器破壞。"
        
        - AlwaysAscii:
            title : "全部使用 Ascii"
            recommend : yes
            author : Ai4rei/AN
            desc : "無論選取何種字型或 langtype ，都會強制 ASCII 文字渲染。確保英文字元在所有服務類型上始終正確顯示。"
        
        - CustomSSQuality:
            title : "自訂螢幕截圖質量"
            recommend : no
            author : Ai4rei/AN
            desc : "變更遊戲內螢幕截圖 (0-100) 的 JPEG 壓縮品質。數值越高，影像越清晰，但檔案越大。預設品質相對較低。"
        
        - CallKoreaClientInfo:
            title : "始終呼叫 SelectKoreaClientInfo()"
            recommend : yes
            author : Shinryo , Secret , CrazyBebop
            desc : "確保 SelectKoreaClientInfo() 始終與 SelectClientInfo() 一起呼叫，解鎖通常僅限於韓國服務類型的功能。建議大多數伺服器啟用完整的用戶端功能。"
        
        
        - DataFolderFirst:
            title : "先讀取data資料夾"
            recommend : no
            author : Shinryo ,Skylove
            desc : "在檢查 GRF 檔案之前從 'data' 資料夾載入鬆散檔案。對於開發和測試自訂精靈、紋理或 Lua 檔案很有用，無需重新包裝 GRF 。"
        
        - PlainTextDesc:
            title : "使用純文字描述"
            recommend : yes
            author : Shinryo , Neo-Mind
            desc : "強制用戶端將物品和技能描述.txt 檔案讀取為純 ASCII 文本，而不是編碼的韓語。英文描述檔需要正確顯示。"
        
        - LoadKrExtSettings:
            title : "始終載入韓國ExternalSettings lua檔案"
            recommend : yes
            author : Secret , Andrei Karas (4144) , X-EcutiOnner,Skylove
            desc : "強制在所有 langtypes 上載入韓文 ExternalSettings Lua 檔案。此檔案控制許多用戶端功能和 UI 選項，這些功能和 UI 選項在韓語服務類型之外不可用。"
        
        - IncrViewID:
            title : "增加安全帽viewID限制"
            recommend : no
            author : Shinryo
            desc : "將最大頭飾 View ID 限制從預設 (1000-3000 depending on client version) 提高到 32000 。對於具有大量自訂頭飾精靈的伺服器來說是必需的。"
        
        - No3DBoneLimit:
            title : "刪除 3D 骨骼限制"
            recommend : no
            author : Ai4rei/AN , Neo-Mind
            desc : "刪除了 3D Granny 模型的硬編碼怪物 ID 限制，允許自訂 3D 怪物超出官方範圍。對於新增 3D 怪物精靈的伺服器來說是必需的。"

        - CustomQuestLua:
            title : "載入自訂 Quest Lua/Lub 檔案"
            recommend : no
            author : Neo-Mind
            desc : "允許載入透過 YAML 設定指定的自訂任務 Lua 檔案。所有列出的檔案必須放置在 'lua files\\\\quest' 資料夾中。對於具有需要額外任務資料檔案的自訂任務的伺服器很有用。"
        
        - IncrMapQuality:
            title : "提高地圖品質"
            recommend : no
            author : Curiosity , Neo-Mind
            desc : "將地圖紋理渲染從 16 位元升級到 32 位元色彩深度，從而實現更平滑的色彩漸變並減少地面紋理上的條帶。可能會稍微增加記憶體使用量。"
        
        - EnableEffectTool:
            title : "為所有地圖啟用效果"
            recommend : no
            author : Neo-Mind
            desc : "讓用戶端從所有地圖上的 EffectTool 資料夾中載入每個地圖效果檔案，而不僅僅是選定的地圖。允許自訂地圖效果 (weather, ambient particles, etc.) 在任何地方工作。"
        
        - ItemInfoPerServer:
            title : "基於字元伺服器載入iteminfo"
            recommend : no
            author : Neo-Mind
            desc : "載入 ItemInfo Lua 檔案並將選定的字元伺服器名稱作為參數傳遞。當託管多個字元伺服器 (e.g., Renewal vs Pre-Renewal) 時，允許每個伺服器使用不同的專案資料庫。"
        
        - UseStateLubIcon:
            title : "使用 stateiconimginfo.lub 中的圖示"
            recommend : no
            author : CH.C (jchcc)
            desc : "停用硬編碼狀態效果圖示並專門從 stateiconimginfo.lub 載入它們。允許透過 Lua 完全自訂 buff /debuff 圖示。"
        
        - CustomDLL:
            title : "新增自訂 DLL"
            recommend : no
            author : Neo-Mind
            desc : "在啟動時將自訂 DLL 載入註入用戶端。指定 DLL 檔案名稱和要呼叫的匯出函式。用於新增自訂功能，例如反作弊、自訂渲染或特定於伺服器的功能。"
        
        - HideBuildInfo:
            title : "隱藏建置訊息"
            recommend : yes
            author : Andrei Karas (4144) , CrazyBebop
            desc : "透過清除所有相關字串來隱藏用戶端的建置日期、時間和版本資訊。防止玩家看到伺服器使用的確切用戶端版本。"
         
        - NoCameraLock:
            title : "停用相機鎖定"
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : "停用 ViewPointTable.txt 中定義的每台地圖相機鎖定，允許在所有地圖上自由旋轉相機。對於喜歡在室內和地下城中手動控制攝影機的玩家很有用。"
        
        - NoMapInfo:
            title : "停用地圖示誌"
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : "停用進入新地圖時出現的地圖名稱標誌 (location banners) ，由 mapInfo.lub 控制。消除那些分散注意力的玩家的視覺混亂。"
        
        - FixArrowsCharset:
            title : "將箭頭翻譯成英語"
            recommend : yes
            author : Andrei Karas (4144) , X-EcutiOnner , Neo-Mind
            desc : "將熱鍵設定 UI 中的箭頭符號和選單按鈕標籤從韓文翻譯為英文。修正了快捷鍵設定視窗中不可讀的韓文文字。"
        
        - BossDropIdentified:
            title : "對 Boss (MVP) 生物使用「已辨識」掉落物"
            recommend : no
            author : CH.C (jchcc)
            desc : "強制 Boss (MVP) 怪物掉落的物品在掉落公告中顯示其已識別的名稱，以便玩家可以準確地看到掉落的物品，而不是 'Unknown Item' 。"
        
        - TranslateClient:
            title : "翻譯客戶"
            recommend : yes
            author : Ai4rei/AN , Neo-Mind
            desc : "使用映射檔案 (defaults to <b>Translations_EN.yml</b>) 的翻譯取代用戶端中硬編碼的韓文文字字串。涵蓋系統訊息、UI 標籤以及其他無法透過 Lua 或 txt 檔案變更的文字。"
        
        - CustomCaptchaDecomp:
            title : "自訂驗證碼分解大小"
            recommend : no
            author : Andrei Karas (4144), Asheraf
            desc : "變更驗證碼影像的最大 zlib 解壓縮緩衝區大小。如果驗證碼圖像由於超出預設大小限製而無法載入，請增加此值。"

        - RestoreCpsDll:
            title : "復原 Cps DLL"
            recommend : no
            author : Andrei Karas (4144), Skylove
            desc : "還原在新用戶端中刪除的 Cps.dll (Gravity's protection DLL) 的載入。僅當您的伺服器需要此 DLL 時才啟用。  <b>警告：</b> 需要 'Add custom DLLs' 修補處於活動狀態；沒有它可能會當機。"

DisableProtect:
    title : "停用保護"
    mutex : false
    
    patches:
        - NoGGuard:
            title : "停用遊戲衛士"
            recommend : yes
            author : Neo-Mind
            desc : "停用 Renewal 用戶端內建的 nProtect GameGuard（Gravity 的防作弊系統）。私服通常需要此修補，因為 GameGuard 會連向 Gravity 官方伺服器，否則可能阻止連線。"
        
SkipLub:
    title : "跳過潤滑"
    mutex : false
    
    patches:
        - SkipSignBoard:
            title : "跳過招牌酒吧"
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : "跳過 SignBoardList lub 檔案的載入。如果您不使用標誌板功能或想要避免因遺失檔案而導致的錯誤，則非常有用。"
        
        - SkipTownInfo:
            title : "跳過 Towninfo 俱樂部"
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : "跳過 Towninfo.lub 檔案的載入。如果您透過其他方式處理城鎮資訊或想要避免因遺失檔案而導致的錯誤，請使用此選項。"

ReadTxtFile:
    title : "讀取.txt 檔案"
    mutex : false
    
    patches:
        - MsgStrings:
            title : "一律閱讀 msgstringtable.txt"
            recommend : yes
            author : Shinryo
            desc : "強制用戶端在每個 langtype 上載入來自 msgstringtable.txt 的所有 UI 訊息，而不是使用硬編碼的韓語字串。對於英語和其他非韓語伺服器至關重要。"
        
        - QuestDisplay:
            title : "一律閱讀 questid2display.txt"
            recommend : yes
            author : Shinryo
            desc : "強制在所有 langtypes 上載入 questid2display.txt 而不是僅在 langtype 0 上。任務 UI 需要顯示正確的任務名稱和非韓國服務類型的描述。"

CustomPath:
    title : "路徑客製"
    mutex : false
    
    patches:
        - CustomDefaultBGM:
            title : "自訂預設 BGM 檔案"
            recommend : no
            author : Jian
            desc : "將登入畫面上播放的預設背景音樂從 <b>bgm\\ 01.mp3</b> 變更為您選取的自訂 MP3 檔案。"
        
        - CustomItemInfoLub:
            title : "自訂 Iteminfo lub"
            recommend : yes
            author : Neo-Mind
            desc : "載入專案資料的自訂 Lua 檔案，而不是預設的 <b>Iteminfo*.lub</b> 。允許您使用重新命名或重組的專案資料庫檔案。"
        
        - CustomAchieveLub:
            title : "自訂成就清單 lub"
            recommend : yes
            author : Jian
            desc : "載入成就資料的自訂 Lua 檔案，而不是預設的 <b>AchievementList*.lub</b> 。對於具有自訂成就係統的伺服器很有用。"
        
        - CustomMonSizeEffLub:
            title : "自訂 MonsterSizeEffect lub"
            recommend : no
            author : Jian
            desc : "載入用於怪物大小效果的自訂 Lua 檔案，而不是預設的 <b>MonsterSizeEffect*.lub</b> 。控制哪些怪物顯示放大或縮小的精靈。"

        - CustomTownInfoLub:
            title : "自訂Towninfo lub"
            recommend : yes
            author : Jian
            desc : "載入城鎮 /city 資料的自訂 Lua 檔案，而不是預設的 <b>Towninfo*.lub</b> 。控制世界地圖上顯示的傳送門標籤和城鎮資訊。"

        - CustomPetEvoClnLub:
            title : "客製化 PetEvolutionCln lub"
            recommend : no
            author : Jian
            desc : "載入寵物進化資料的自訂 Lua 檔案，而不是預設的 <b>PetEvolutionCln*.lub</b> 。新增自訂寵物進化路徑時使用。"
        
        - CustomTipboxLub:
            title : "自訂 Tipbox lub"
            recommend : yes
            author : Jian
            desc : "載入提示框（載入畫面提示）的自訂 Lua 檔案，而不是預設的 <b>Tipbox*.lub</b>。允許為伺服器自訂載入提示。"
        
        - CustomCheckAttLub:
            title : "自訂 CheckAttendance lub"
            recommend : no
            author : Jian
            desc : "為考勤簽到系統載入自訂 Lua 檔案，而不是預設的 <b>CheckAttendance*.lub</b> 。自訂每日登入獎勵資料時使用。"
        
        - CustomPrivAirplaneLub:
            title : "自訂 PrivateAirplane lub"
            recommend : no
            author : Jian
            desc : "為私人飛艇系統載入自訂 Lua 檔案，而不是預設的 <b>PrivateAirplane*.lub</b> 。自訂飛艇目標或傳送資料時使用。"
        
        - CustomMapInfoLub:
            title : "自訂 MapInfo lub"
            recommend : yes
            author : X-EcutiOnner
            desc : "載入自訂 Lua 檔案以取得地圖資訊，而不是預設的 <b>MapInfo*.lub</b> 。控制輸入地圖時顯示的地圖名稱橫幅和位置資料。"
        
        - CustomOngQuestInfoLub:
            title : "自訂 OngoingQuestInfoList lub"
            recommend : yes
            author : Jian
            desc : "載入自訂 Lua 檔案以取得正在進行的任務資訊，而不是預設的 <b>OngoingQuestInfoList*.lub</b> 。在自訂任務追蹤器顯示時使用。"

        - CustomRcmdQuestInfoLub:
            title : "自訂RecommendedQuestInfoList lub"
            recommend : yes
            author : Jian
            desc : "載入建議任務資料的自訂 Lua 檔案，而不是預設的 <b>RecommendedQuestInfoList*.lub</b> 。在自訂向玩家顯示的建議任務時使用。"
        - CustomspopupLub:
            title : "自訂 spopup lub"
            recommend : yes
            author : llchrisll,Skylove
            desc : "載入技能彈出資料的自訂 Lua 檔案，而不是預設的 <b>spopup.lub</b> 。控制將滑鼠懸停在技能上時顯示的彈出文字。"

        - CustomChangeMatLub:
            title : "自訂 ChangeMaterial lub"
            recommend : no
            author : llchrisll
            desc : "載入材料變更資料的自訂 Lua 檔案，而不是預設的 <b>ChangeMaterial.lub</b> 。控制製作 UI 中顯示的材料/素材清單。"

        - CustomQuestQualiLub:
            title : "自訂 QuestClassificationInfo lub"
            recommend : yes
            author : llchrisll,Skylove
            desc : "載入任務分類資料的自訂 Lua 檔案，而不是預設的 <b>QuestClassificationInfo.lub</b> 。控制任務視窗中的任務類別標籤和排序。"

        - CustomRuneDescLub:
            title : "自訂 Rune\\rune_desc lub"
            recommend : no
            author : llchrisll
            desc : "載入用於符文描述的自訂 Lua 檔案，而不是預設的 <b>Rune\\rune_desc.lub</b> 。自訂符文工具提示文字時使用。"

        - CustomRuneSetDescLub:
            title : "自訂 Rune\\runeset_desc lub"
            recommend : no
            author : llchrisll
            desc : "載入符文集描述的自訂 Lua 檔案，而不是預設的 <b>Rune\\runeset_desc.lub</b> 。在自訂符文集獎勵工具提示文字時使用。"

        - CustomitemDecomLub:
            title : "自訂 Rune\\itemDecom lub"
            recommend : no
            author : llchrisll
            desc : "載入符文物品分解資料的自訂 Lua 檔案，而不是預設的 <b>Rune\\itemDecom.lub</b> 。控制符文系統中哪些物品可以分解。"

        - CustomRuneInfoLub:
            title : "自訂 Rune\\rune_info lub"
            recommend : no
            author : llchrisll
            desc : "載入自訂 Lua 檔案以取得符文訊息，而不是預設的 <b>Rune\\ rune_info.lub</b> 。控制 UI 中顯示的符文統計資訊和屬性。"

        - CustomRuneSetInfoLub:
            title : "自訂 Rune\\runeset_info lub"
            recommend : no
            author : llchrisll
            desc : "載入自訂 Lua 檔案以取得符文集訊息，而不是預設的 <b>Rune\\ runeset_info.lub</b> 。控制使用者介面中顯示的符文集資料和獎勵。"

        - CustomRuneSystemTableLub:
            title : "自訂 Rune\\runeSystem_table lub"
            recommend : no
            author : llchrisll
            desc : "為 rune 系統表載入自訂 Lua 檔案，而不是預設的 <b>Rune\\ runeSystem_table.lub</b> 。控制主符文系統設定資料。"

        - CustomRuneSystemIdLub:
            title : "自訂 Rune\\runesystemid lub"
            recommend : no
            author : llchrisll
            desc : "載入符文系統 ID 的自訂 Lua 檔案，而不是預設的 <b>Rune\\ runesystemid.lub</b> 。控制系統使用的符文 ID 的對應。"

        - CustomRuneSystemInfoLub:
            title : "自訂 Rune\\runesystemInfo lub"
            recommend : no
            author : llchrisll
            desc : "載入用於符文系統顯示資訊的自訂 Lua 檔案，而不是預設的 <b>Rune\\ runesystemInfo.lub</b> 。控制符文系統 UI 標籤和描述。"

        - CustomRuneRewardLub:
            title : "自訂符文\\runeset_reward lub"
            recommend : no
            author : llchrisll
            desc : "載入符文集獎勵的自訂 Lua 檔案，而不是預設的 <b>Rune\\ runeset_reward.lub</b> 。控制符文組完成獎勵資料。"

        - CustomLicenseTxt:
            title : "自訂授權檔案"
