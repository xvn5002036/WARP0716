GetPacketKeys:
    title : 取得封包金鑰
    tooltip : 擷取已載入用戶端用於混淆的封包金鑰
    author : Neo-Mind
    icon : Inputs/key.png

ExtractTxtNames:
    title : 擷取 txt 檔案名稱
    tooltip : 擷取已載入用戶端中嵌入的 txt 檔案名稱
    icon : Inputs/files.png

ExtractMsgStrings:
    title : 擷取 msgstringtable
    tooltip : 從已載入的用戶端擷取嵌入的 msgstringtable
    author : Neo-Mind
    icon : Inputs/files.png

DumpImportTable:
    title : 匯出 Import Table
    tooltip : 匯出已載入用戶端的完整 Import Table（dll 名稱與匯入函式）
    author : Neo-Mind
    icon : Inputs/import.png
    
GenMapEffectPlugin:
    title : 產生 MapEffect 外掛 [Expt.]
    tooltip : 為已載入的用戶端產生 Curiosity 的 mapeffect 外掛（輸出為 rdll2_<filename>.asi，需放在用戶端目錄）
    author : Neo-Mind
 
